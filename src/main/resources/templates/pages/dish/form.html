<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{components/heads :: formHead(
    ${dish.id == null ? 'Nouveau Plat' : 'Modifier Plat'}
)}">
</head>

<body>

<header th:replace="~{components/headers :: mainHeader}"></header>

<main class="main centered">
    <div class="form-container">

        <h1 th:text="${dish.id == null ? 'Ajouter un nouveau plat' : 'Modifier le plat'}">
            Formulaire
        </h1>

        <form th:action="${dish.id == null ? '/dishes' : '/dishes/' + dish.id}"
              th:object="${dish}"
              method="post">

            <!-- ID (hidden) -->
            <input type="hidden" th:field="*{id}" />

            <!-- NAME -->
            <div class="form-group">
                <label for="nameDish">Nom</label>
                <input type="text" id="nameDish" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'input-error' : ''"
                       placeholder="Ex: Margherita" />

                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-text">
                    Erreur nom
                </div>
            </div>

            <!-- PRICE -->
            <div class="form-group">
                <label for="priceDish">Prix (€)</label>
                <input type="number" step="0.01" id="priceDish" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'input-error' : ''" />

                <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="error-text">
                    Erreur prix
                </div>
            </div>

            <!-- CATEGORY -->
            <div class="form-group">
                <label for="categoryDish">Type</label>
                <select id="categoryDish" th:field="*{category}"
                        th:classappend="${#fields.hasErrors('category')} ? 'input-error' : ''">

                    <option value="pizza">Pizza</option>
                    <option value="boisson">Boisson</option>
                    <option value="dessert">Dessert</option>
                </select>

                <div th:if="${#fields.hasErrors('category')}" th:errors="*{category}" class="error-text">
                    Erreur catégorie
                </div>
            </div>

            <!-- DESCRIPTION -->
            <div class="form-group">
                <label for="descDish">Description</label>
                <textarea id="descDish" th:field="*{description}"
                          th:classappend="${#fields.hasErrors('description')} ? 'input-error' : ''">
                </textarea>

                <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-text">
                    Erreur description
                </div>
            </div>

            <div th:replace="~{components/errors :: globalErrors}"></div>

            <div class="form-actions">
                <button type="submit" class="btn primary">
                    <span th:text="${dish.id == null ? 'Créer' : 'Sauvegarder'}"></span>
                </button>

                <a th:href="@{/dishes}" class="btn secondary">Annuler</a>
            </div>

        </form>
    </div>
</main>

<footer th:replace="~{components/footers :: mainFooter}"></footer>

<script th:src="@{/script/main.js}"></script>

</body>
</html>
