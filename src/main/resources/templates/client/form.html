<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouveau Client - Pizzeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F1FAEE; color: #1D3557; }
        .navbar { background-color: #1D3557 !important; }
        .btn-save { background-color: #2A9D8F; color: white; border: none; }
        .btn-save:hover { background-color: #21867a; color: white; }
        .btn-cancel { background-color: #E63946; color: white; border: none; }
        .btn-cancel:hover { background-color: #d0303d; color: white; }
        /* Style personnalisé pour les messages d'erreur */
        .error-message { color: #E63946; font-size: 0.875em; margin-top: 0.25rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 p-3">
    <div class="container">
        <a class="navbar-brand" href="#">🍕 Pizzeria Firenze</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-4 rounded shadow-sm">
            <h3 class="mb-4" th:text="${client.id == null ? 'Ajouter un Client' : 'Modifier le Client'}"></h3>

            <form th:action="${client.id == null ? '/clients/nouveau' : '/clients/modifier/' + client.id}"
                  th:object="${client}"
                  method="post">

                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="firstName" class="form-label">Prénom</label>
                    <input type="text" id="firstName" class="form-control" th:field="*{firstName}"
                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''">

                    <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error-message">
                        Erreur de prénom
                    </div>
                </div>

                <div class="mb-4">
                    <label for="lastName" class="form-label">Nom</label>
                    <input type="text" id="lastName" class="form-control" th:field="*{lastName}"
                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''">

                    <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error-message">
                        Erreur de nom
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/clients}" class="btn btn-cancel">Annuler</a>
                    <button type="submit" class="btn btn-save">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
