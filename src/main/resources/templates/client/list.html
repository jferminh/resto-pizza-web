<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pizzeria Firenze - Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F1FAEE; color: #1D3557; font-family: 'Inter', sans-serif; }
        .navbar, .table-dark { background-color: #1D3557 !important; }
        .btn-add { background-color: #2A9D8F; color: white; border: none; }
        .btn-add:hover { background-color: #21867a; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 p-3">
    <div class="container">
        <a class="navbar-brand" href="#">🍕 Pizzeria Firenze - Back-Office</a>
    </div>
</nav>

<div class="container bg-white p-4 rounded shadow-sm">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0">Gestion des Clients</h2>
        <a th:href="@{/clients/nouveau}" class="btn btn-add">+ Nouveau Client</a>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Prénom</th>
            <th>Nom</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${clients}">
            <td th:text="${c.id}">1</td>
            <td th:text="${c.firstName}">Jean</td>
            <td th:text="${c.lastName}">Dupont</td>
            <td>
                <a th:href="@{/clients/modifier/{id}(id=${c.id})}" class="btn btn-sm btn-outline-secondary">Modifier</a>

                <a th:href="@{/clients/supprimer/{id}(id=${c.id})}"
                   class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce client ?');">
                    Supprimer
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(clients)}">
            <td colspan="4" class="text-center text-muted">Aucun client trouvé dans la base de données.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
