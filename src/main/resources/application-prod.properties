# ============================================================
# application-prod.properties : Profil production / Docker
# ✅ Toutes les valeurs sensibles via variables d'environnement
# ============================================================

# Thymeleaf : cache activé en prod (performance)
spring.thymeleaf.cache=true

# URL de l'API injectée par docker-compose via la variable API_URL
# "api" = nom du service dans docker-compose, jamais localhost
# La valeur après : est le fallback si API_URL n'est pas définie
com.resto.pizzeria.web.apiUrl=${API_URL}/api

# Logs minimalistes en prod
logging.level.root=WARN
logging.level.com.resto.pizzeria=INFO