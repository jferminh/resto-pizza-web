# ============================================================
# application.properties : Configuration commune (tous profils)
# ============================================================

spring.application.name=resto-pizza-web
server.port=8081

# Profil actif par defaut (dev en local)
spring.profiles.active=dev

# Erreurs HTTP : ne jamais exposer les details en prod
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never